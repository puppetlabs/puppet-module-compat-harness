name: Run Module Compatibility Test
description: >
  Shared steps for running a Puppet module through the compatibility harness.
  Handles checkout, prerequisites, Ruby/Python setup, runner invocation,
  status recording, summary writing, artifact upload, and failure diagnostics.

inputs:
  module-json:
    description: 'JSON-encoded matrix module object'
    required: true
  module-id:
    description: 'Stable module identifier for paths and artifact names'
    required: true
  profile:
    description: 'Compatibility profile name'
    required: false
    default: '8-latest-maintained'
  metadata-mode:
    description: 'Metadata handling mode (warn|fail)'
    required: false
    default: 'warn'
  test-mode:
    description: 'Test mode: unit or acceptance'
    required: false
    default: 'unit'
  allow-acceptance:
    description: 'Pass --allow-acceptance flag'
    required: false
    default: 'false'
  beaker-setfile:
    description: 'Path to Beaker setfile (acceptance only)'
    required: false
    default: ''
  output-dir:
    description: 'Output directory for results'
    required: true
  artifact-name:
    description: 'Name for the uploaded artifact'
    required: true
  test-lane:
    description: 'Test lane label (unit or acceptance)'
    required: false
    default: 'unit'
  acceptance-target:
    description: 'Acceptance target name (acceptance only)'
    required: false
    default: 'unit'
  prereqs-json:
    description: 'JSON-encoded prereqs object'
    required: false
    default: '{}'
  docker-mode:
    description: 'Docker container mode: sshd (default) or systemd'
    required: false
    default: 'sshd'
  install-puppetserver:
    description: 'Install Puppet Core server (puppetserver) in acceptance test image'
    required: false
    default: 'false'
  enable-debug:
    description: 'Enable verbose debug output (captures Docker logs, acceptance output)'
    required: false
    default: 'false'
  setup-commands:
    description: 'JSON array of additional shell commands to run during SUT image build (e.g. AppArmor disable)'
    required: false
    default: '[]'

runs:
  using: composite
  steps:
    - name: Enable Git long paths on Windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        git config --global core.longpaths true
        git config --global --get core.longpaths

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install module prerequisites on Ubuntu
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        apt_pkgs=$(echo '${{ inputs.prereqs-json }}' | python -c "import json,sys; d=json.load(sys.stdin); pkgs=d.get('apt',[]); print(' '.join(pkgs)) if pkgs else None")
        if [ -n "$apt_pkgs" ]; then
          sudo apt-get update -qq
          sudo apt-get install -y $apt_pkgs
        fi

    - name: Install module prerequisites on Windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $prereqs = '${{ inputs.prereqs-json }}' | ConvertFrom-Json
        if ($null -ne $prereqs -and $null -ne $prereqs.choco -and $prereqs.choco.Count -gt 0) {
          choco install -y @($prereqs.choco)
        }

    - name: Install module prerequisites on macOS
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail
        brew_pkgs=$(echo '${{ inputs.prereqs-json }}' | python -c "import json,sys; d=json.load(sys.stdin); pkgs=d.get('brew',[]); print(' '.join(pkgs)) if pkgs else None")
        if [ -n "$brew_pkgs" ]; then
          brew update
          brew install $brew_pkgs
        fi

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true

    - name: Install runner
      shell: bash
      run: bundle install

    - name: Build single-module config
      shell: bash
      run: |
        mkdir -p .tmp
        ruby -rjson -e "mod=JSON.parse(ENV.fetch('MODULE_JSON')); File.write('.tmp/single-module.json', JSON.pretty_generate({'modules'=>[{'repo'=>mod.fetch('repo'),'ref'=>mod.fetch('ref','main')}] }))"
      env:
        MODULE_JSON: ${{ inputs.module-json }}

    - name: Run compatibility runner
      id: run_runner
      continue-on-error: true
      shell: bash
      env:
        PUPPET_ACCEPTANCE_DEBUG: ${{ inputs.enable-debug }}
      run: |
        runner_args=(
          --modules-file .tmp/single-module.json
          --profiles-file profiles/puppet_profiles.json
          --profile "${{ inputs.profile }}"
          --test-mode "${{ inputs.test-mode }}"
          --workspace-dir w
          --output-dir "${{ inputs.output-dir }}"
        )
        if [ "${{ inputs.allow-acceptance }}" = "true" ]; then
          runner_args+=(--allow-acceptance)
        fi
        if [ -n "${{ inputs.beaker-setfile }}" ]; then
          runner_args+=(--beaker-setfile "${{ inputs.beaker-setfile }}")
        fi
        if [ "${{ inputs.docker-mode }}" = "systemd" ]; then
          runner_args+=(--docker-mode systemd)
        fi
        if [ "${{ inputs.install-puppetserver }}" = "true" ]; then
          runner_args+=(--install-puppetserver)
        fi
        setup_cmds='${{ inputs.setup-commands }}'
        if [ "$setup_cmds" != "[]" ] && [ "$setup_cmds" != "" ]; then
          runner_args+=(--setup-commands "$setup_cmds")
        fi
        ruby bin/puppet-module-tester "${runner_args[@]}"

    - name: Record module status
      if: always()
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "${{ inputs.output-dir }}"
        python scripts/classify_module_result.py
      env:
        REPORT: ${{ inputs.output-dir }}/compatibility-report.json
        STATUS_FILE: ${{ inputs.output-dir }}/module-status.json
        MODULE_ID: ${{ inputs.module-id }}
        TEST_LANE: ${{ inputs.test-lane }}
        ACCEPTANCE_TARGET: ${{ inputs.acceptance-target }}

    - name: Write module summary
      if: always()
      shell: bash
      run: |
        set -euo pipefail
        python scripts/render_module_job_summary.py
      env:
        STATUS_FILE: ${{ inputs.output-dir }}/module-status.json
        MODULE_ID: ${{ inputs.module-id }}
        ARTIFACT_NAME: ${{ inputs.artifact-name }}

    - name: Show failure diagnostics
      if: steps.run_runner.outcome == 'failure'
      shell: bash
      run: bash scripts/show_diagnostics.sh "${{ inputs.output-dir }}" "${{ inputs.module-id }}" "${{ inputs.test-lane }}"
